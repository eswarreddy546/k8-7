apiVersion: v1
kind: Pod

metadata:
  name: liveness-readness-pod
  namespace: roboshop
  labels:
    name: "liveness-readness"
    project: "uic"
    env: "dev"

spec:
  containers:
    - name: nginx
      image: nginx

      ports:
        - containerPort: 80

      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 5

      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5