# ===========================================
# StorageClass
# ===========================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: roboshop-dev

provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

parameters:
  type: gp3

---
# ===========================================
# Headless Service
# ===========================================
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: roboshop
  labels:
    app: mysql

spec:
  clusterIP: None

  selector:
    app: mysql

  ports:
    - name: mysql
      port: 3306
      targetPort: 3306

---
# ===========================================
# StatefulSet
# ===========================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: roboshop

spec:
  serviceName: mysql-headless

  replicas: 3

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent

          env:
            - name: MYSQL_ROOT_PASSWORD
              value: roboshop

          ports:
            - name: mysql
              containerPort: 3306

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

  volumeClaimTemplates:
    - metadata:
        name: mysql-storage

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: roboshop-dev

        resources:
          requests:
            storage: 10Gi