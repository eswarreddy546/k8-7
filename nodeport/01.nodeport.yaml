apiVersion: v1
kind: Pod
metadata:
   name: pod-demo
   namespace: roboshop
   labels:
     project: "new"
     environment: "dev"

spec:
   containers:
    - name: nginx
      image: nginx

      ports:
       - containerPort: 80

---
apiVersion: v1
kind: Service
metadata: 
  name: service
  namespace: roboshop

spec:
  selector:
    project: "new"
    environment: "dev"

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
   
    
  type: NodePort
