apiVersion: v1
kind: Pod

metadata:
  name: pod-loadbalancer
  namespace: roboshop
  labels:
    project: "latest"
    type: "loadbalcer"
    env: "load"

spec:
  containers:
    - name: nginx
      image: nginx
      ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: service-demo
  namespace: roboshop

spec:
  selector:
    project: "latest"
    type: "loadbalcer"
    env: "load"

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

  type: LoadBalancer